<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f3d5c" />
  <meta name="description" content="CBA 生物医药全球研发信息汇总 · 周报与跨平台发布底稿" />
  <meta name="keywords" content="CBA,Chinese Biopharmaceutical Association,生物医药,研发,周报,biopharma,R&amp;D" />
  <meta property="og:title" content="CBA 生物医药全球研发信息汇总" />
  <meta property="og:description" content="美国华人生物医药协会（CBA）志愿者整理的全球研发信息周报与索引。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://cba-usa.github.io/cba-biopharma/" />
  <title>CBA 生物医药全球研发信息汇总</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "CBA 生物医药全球研发信息汇总",
    "description": "CBA 志愿者整理的生物医药研发信息周报",
    "url": "https://cba-usa.github.io/cba-biopharma/",
    "publisher": {

      "name": "Chinese Biopharmaceutical Association, USA (CBA)",

  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,450..600;1,9..40,450..600&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --cba-ink: #14232f;
      --cba-muted: #5a6b7a;
      --cba-accent: #0d5c7c;
      --cba-accent-soft: #e8f2f6;
      --cba-border: #d8e2e9;
      --cba-bg: #f7f9fb;
      --cba-sidebar-bg: #f0f4f8;
      --cba-card: #ffffff;
      --cba-memo-bg: #fff8e6;
      --cba-memo-border: #e3a72f;
      --cba-memo-soft: #fff1c7;
      --base-font-size: 17px;
      --theme-color: var(--cba-accent);
      --theme-color-lighter: #1a7a9e;
    }

    body {
      font-family: "DM Sans", "Noto Serif SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--cba-ink);
      letter-spacing: 0;
    }

    /* 侧栏 */
    .sidebar {
      background: linear-gradient(180deg, var(--cba-sidebar-bg) 0%, #e8eef4 100%);
      border-right: 1px solid var(--cba-border);
      padding-top: 0.5rem;
    }
    .sidebar > h1 a,
    .app-name-link {
      font-family: "Noto Serif SC", serif;
      font-weight: 600 !important;
      font-size: 1.05rem !important;
      line-height: 1.35 !important;
      color: var(--cba-accent) !important;
      padding: 0.75rem 1rem 1rem !important;
    }
    .sidebar ul li a {
      border-radius: 6px;
      margin: 2px 0.35rem;
      padding: 0.45rem 0.65rem !important;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .sidebar ul li a:hover {
      background: rgba(13, 92, 124, 0.08);
      color: var(--cba-accent) !important;
    }
    .sidebar ul li.active > a {
      background: var(--cba-accent-soft);
      color: var(--cba-accent) !important;
      font-weight: 600;
      border-left: 3px solid var(--cba-accent);
      padding-left: calc(0.65rem - 3px) !important;
    }
    .sidebar-nav > ul > li > ul {
      margin: 0.15rem 0 0.7rem;
    }
    .sidebar-nav li ul li a {
      font-size: 0.9rem;
      line-height: 1.38;
      color: #31495c;
    }
    .sidebar-nav li.active > ul {
      border-left: 1px solid rgba(13, 92, 124, 0.18);
      margin-left: 0.9rem;
      padding-left: 0.35rem;
    }
    .sidebar .search {
      margin: 0.5rem 0.75rem 1rem;
      border: 1px solid var(--cba-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--cba-card);
      box-shadow: 0 1px 3px rgba(15, 35, 60, 0.06);
    }
    .sidebar .search input {
      font-size: 0.9rem !important;
    }

    /* 主内容区背景 */
    .markdown-section {
      max-width: 42rem;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 4rem;
      font-size: var(--base-font-size);
      line-height: 1.75;
      background: var(--cba-card);
      box-shadow: 0 0 0 1px rgba(15, 35, 60, 0.04), 0 12px 40px -20px rgba(15, 35, 60, 0.12);
      border-radius: 12px;
      margin-top: 1rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 768px) {
      .markdown-section {
        margin: 0.5rem 0.65rem 2rem;
        padding: 1.15rem 1.1rem 3rem;
        border-radius: 10px;
        font-size: 16px;
      }
    }

    /* 标题层次 */
    .markdown-section h1 {
      font-family: "Noto Serif SC", serif;
      font-weight: 700;
      font-size: 1.65rem;
      color: var(--cba-ink);
      border-bottom: 2px solid var(--cba-accent-soft);
      padding-bottom: 0.5rem;
      margin-top: 0;
    }
    .markdown-section h2 {
      font-family: "Noto Serif SC", serif;
      font-weight: 600;
      font-size: 1.28rem;
      color: var(--cba-accent);
      margin-top: 2rem;
      padding-top: 0.25rem;
      border-left: 4px solid var(--cba-accent);
      padding-left: 0.75rem;
    }
    .markdown-section h3 {
      font-size: 1.08rem;
      font-weight: 600;
      color: var(--cba-ink);
      margin-top: 1.5rem;
    }
    .markdown-section h4 {
      font-size: 1rem;
      color: var(--cba-muted);
      font-weight: 600;
    }

    .markdown-section p {
      margin: 0.85em 0;
      color: var(--cba-ink);
    }
    .markdown-section strong {
      color: var(--cba-ink);
      font-weight: 600;
    }

    .markdown-section a {
      color: var(--cba-accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(13, 92, 124, 0.35);
      transition: border-color 0.15s, color 0.15s;
    }
    .markdown-section a:hover {
      color: var(--theme-color-lighter);
      border-bottom-color: var(--theme-color-lighter);
    }

    .markdown-section hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cba-border), transparent);
      margin: 2rem 0;
    }

    .markdown-section blockquote {
      margin: 1rem 0;
      padding: 0.65rem 1rem;
      border-left: 4px solid var(--cba-accent);
      background: var(--cba-accent-soft);
      border-radius: 0 8px 8px 0;
      color: var(--cba-muted);
      font-size: 0.95em;
    }

    .markdown-section ul,
    .markdown-section ol {
      padding-left: 1.35rem;
    }
    .markdown-section li {
      margin: 0.35em 0;
    }

    /* 表格：长内容自动换行，窄屏横向拖拽 */
    .markdown-section .cba-table-scroll {
      max-width: 100%;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      margin: 1rem 0 1.25rem;
      border: 1px solid var(--cba-border);
      border-radius: 8px;
      background: var(--cba-card);
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      touch-action: pan-x pan-y;
    }
    .markdown-section .cba-table-scroll:active {
      cursor: grabbing;
    }
    .markdown-section table {
      display: table;
      width: max-content;
      min-width: 100%;
      margin: 0;
      border-collapse: collapse;
      font-size: 0.92em;
      table-layout: fixed;
      white-space: normal;
      word-break: normal;
      overflow-wrap: anywhere;
      box-shadow: none;
    }
    .markdown-section thead {
      background: var(--cba-accent-soft);
    }
    .markdown-section th,
    .markdown-section td {
      border: 1px solid var(--cba-border);
      padding: 0.5rem 0.75rem;
      text-align: left;
      min-width: 8rem;
      width: 12rem;
      max-width: 18rem;
      white-space: normal !important;
      word-break: break-word !important;
      overflow-wrap: anywhere !important;
      hyphens: auto !important;
      vertical-align: top;
      line-height: 1.55;
    }
    .markdown-section th {
      white-space: normal;
    }

    .markdown-section {
      overflow-wrap: break-word;
      word-break: normal;
    }

    .markdown-section .cba-report-toc {
      margin: 1rem 0 1.5rem;
      padding: 0.65rem 0.9rem 0.85rem;
      border: 1px solid var(--cba-border);
      border-left: 4px solid var(--cba-accent);
      border-radius: 10px;
      background: linear-gradient(180deg, var(--cba-accent-soft), rgba(255, 255, 255, 0.9));
    }
    .markdown-section .cba-report-toc h2 {
      margin-top: 1.25rem;
      border-left: 0;
      padding-left: 0;
      color: var(--cba-ink);
      font-size: 1.08rem;
    }
    .markdown-section .cba-report-toc h2:first-child {
      margin-top: 0.2rem;
    }
    .markdown-section .cba-report-toc a {
      display: block;
      padding: 0.5rem 0;
      font-weight: 600;
      line-height: 1.45;
      border-bottom: 1px solid rgba(13, 92, 124, 0.14);
    }
    .markdown-section .cba-report-toc a:last-child {
      border-bottom: 0;
    }

    .markdown-section .cba-heading-tools {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-left: 0.65rem;
      vertical-align: middle;
      font-family: "DM Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1;
    }
    .markdown-section .cba-heading-tools a {
      display: inline-flex;
      align-items: center;
      min-height: 1.45rem;
      padding: 0.24rem 0.48rem;
      border: 1px solid rgba(13, 92, 124, 0.24);
      border-radius: 999px;
      background: var(--cba-card);
      text-decoration: none;
    }
    .markdown-section .cba-floating-toc {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      z-index: 35;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.55rem;
      padding: 0 0.9rem;
      border-radius: 999px;
      background: var(--cba-accent);
      color: #fff !important;
      border: 0 !important;
      box-shadow: 0 10px 22px -14px rgba(15, 35, 60, 0.75);
      font-size: 0.88rem;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .markdown-section table {
        min-width: 48rem;
        font-size: 0.86em;
      }
      .markdown-section th,
      .markdown-section td {
        min-width: 8.5rem;
        width: 11rem;
        max-width: 13rem;
        padding: 0.48rem 0.58rem;
      }
      .markdown-section .cba-heading-tools {
        display: flex;
        margin: 0.55rem 0 0;
        font-size: 0.76rem;
      }
      .markdown-section .cba-floating-toc {
        right: 0.85rem;
        bottom: 0.85rem;
        min-height: 2.35rem;
        padding: 0 0.75rem;
      }
    }

    .markdown-section blockquote.cba-investment-memo {
      margin: 1.35rem 0 1.75rem;
      padding: 1rem 1.05rem;
      border: 1px solid rgba(227, 167, 47, 0.55);
      border-left: 5px solid var(--cba-memo-border);
      border-radius: 10px;
      background: linear-gradient(180deg, var(--cba-memo-bg), #ffffff 140%);
      box-shadow: 0 10px 24px -18px rgba(119, 82, 16, 0.55);
      color: var(--cba-ink);
      overflow: hidden;
    }
    .markdown-section blockquote.cba-investment-memo > p:first-child {
      margin-top: 0;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid rgba(227, 167, 47, 0.35);
      font-size: 1.02em;
    }
    .markdown-section blockquote.cba-investment-memo .cba-table-scroll {
      background: rgba(255, 255, 255, 0.78);
      border-color: rgba(227, 167, 47, 0.45);
    }
    .markdown-section blockquote.cba-investment-memo thead {
      background: var(--cba-memo-soft);
    }
    .markdown-section blockquote.cba-investment-memo p,
    .markdown-section blockquote.cba-investment-memo li {
      color: var(--cba-ink);
    }

    /* 代码块 */
    .markdown-section pre {
      max-width: 100%;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      border-radius: 10px;
      border: 1px solid var(--cba-border);
      background: #f4f7fa !important;
      font-size: 0.88em;
      line-height: 1.55;
    }
    .markdown-section pre code {
      white-space: pre-wrap !important;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .markdown-section code {
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
      font-size: 0.88em;
      background: rgba(13, 92, 124, 0.07);
      padding: 0.12em 0.35em;
      border-radius: 4px;
    }
    .markdown-section pre code {
      background: transparent;
      padding: 0;
    }

    .markdown-section .cba-yuanwen {
      margin: 0.75rem 0 1.25rem;
      padding: 0.85rem 1rem;
      background: var(--cba-accent-soft);
      border-radius: 10px;
      border-left: 4px solid var(--cba-accent);
      font-size: 0.96em;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    /* 主区域背景色 */
    section.content,
    .content {
      background: var(--cba-bg);
      min-height: 100vh;
    }

    /* 移动端侧栏打开时 */
    @media (max-width: 768px) {
      :root { --base-font-size: 16px; }
      .sidebar-toggle {
        background: var(--cba-accent) !important;
      }
    }

    .app-name-link img {
      max-height: 2rem;
    }

    /* —— 周报元数据：关键词、标签 —— */
    .markdown-section .cba-doc-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.65rem;
      margin: 0 0 1.35rem;
      padding: 0.7rem 0.9rem;
      background: var(--cba-accent-soft);
      border-radius: 10px;
      border: 1px solid var(--cba-border);
      font-size: 0.9em;
      line-height: 1.5;
    }
    .markdown-section .cba-meta-label {
      font-weight: 600;
      color: var(--cba-muted);
      flex: 0 0 auto;
    }
    .markdown-section .cba-meta-label::after {
      content: "：";
    }
    .markdown-section .cba-kw,
    .markdown-section .cba-tag {
      display: inline-block;
      padding: 0.12rem 0.5rem;
      border-radius: 999px;
      font-size: 0.8em;
      font-weight: 500;
      margin: 0.1rem 0.15rem 0.1rem 0;
    }
    .markdown-section .cba-kw {
      background: var(--cba-card);
      border: 1px solid var(--cba-border);
      color: var(--cba-ink);
    }
    .markdown-section .cba-tag {
      background: rgba(13, 92, 124, 0.11);
      color: var(--cba-accent);
      border: 1px solid rgba(13, 92, 124, 0.22);
    }
    .markdown-section .cba-tag.cba-tag--stat {
      background: rgba(140, 90, 20, 0.1);
      color: #7a5010;
      border-color: rgba(140, 90, 20, 0.28);
    }

    /* 比例条（在 Markdown 里写宽度百分比） */
    .markdown-section .cba-pct-row {
      display: grid;
      grid-template-columns: minmax(4.2rem, 6.5rem) 1fr 2.6rem;
      align-items: center;
      gap: 0.45rem 0.65rem;
      margin: 0.45rem 0;
      font-size: 0.88em;
    }
    .markdown-section .cba-pct-name {
      color: var(--cba-muted);
    }
    .markdown-section .cba-pct-track {
      height: 9px;
      background: #e2ebf2;
      border-radius: 999px;
      overflow: hidden;
    }
    .markdown-section .cba-pct-fill {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--cba-accent), #2a9fc9);
      border-radius: 999px;
      min-width: 2px;
      transition: width 0.35s ease;
    }
    .markdown-section .cba-pct-val {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--cba-accent);
    }

    /* 读者地区 / 国家（周报内手写或引用后台统计摘要） */
    .markdown-section .cba-geo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin: 0.5rem 0 1rem;
    }
    .markdown-section .cba-geo-chip {
      padding: 0.22rem 0.55rem;
      border-radius: 8px;
      background: var(--cba-card);
      border: 1px solid var(--cba-border);
      font-size: 0.84em;
    }
    .markdown-section .cba-geo-chip strong {
      color: var(--cba-accent);
      font-weight: 600;
    }

    /* 全站页脚（Docsify 注入） */
    .cba-site-footer {
      margin-top: 2.5rem;
      padding-top: 1.25rem;
      font-size: 0.88em;
      color: var(--cba-muted);
      line-height: 1.65;
    }
    .cba-site-footer .cba-footer-hr {
      margin: 0 0 1rem;
      background: linear-gradient(90deg, transparent, var(--cba-border), transparent);
      height: 1px;
      border: none;
    }
    .cba-site-footer .cba-footer-grid {
      display: grid;
      gap: 1rem;
    }
    @media (min-width: 640px) {
      .cba-site-footer .cba-footer-grid {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }
    }
    .cba-site-footer strong {
      color: var(--cba-ink);
      font-size: 0.95em;
    }
    .cba-site-footer .cba-footer-mission {
      margin: 0.35rem 0 0;
    }
    .cba-site-footer .cba-footer-mission a {
      border-bottom: 1px solid rgba(13, 92, 124, 0.35);
    }
    .cba-site-footer .cba-footer-note {
      margin: 0;
      padding: 0.5rem 0.65rem;
      background: rgba(13, 92, 124, 0.05);
      border-radius: 8px;
      border: 1px solid var(--cba-border);
    }
    .cba-site-footer .cba-footer-note code {
      font-size: 0.88em;
    }
    .cba-site-footer .cba-footer-disclaimer {
      margin: 1rem 0 0;
      padding-top: 0.85rem;
      border-top: 1px dashed var(--cba-border);
      font-size: 0.9em;
    }

    /* 首页：周报入口（避免把大段代码放在首页触发错乱按钮） */
    .markdown-section .cba-home-cta {
      margin: 0 0 1.75rem;
      padding: 1.1rem 1.2rem;
      background: linear-gradient(135deg, var(--cba-accent-soft), var(--cba-card));
      border: 1px solid var(--cba-border);
      border-radius: 12px;
      border-left: 4px solid var(--cba-accent);
    }
    .markdown-section .cba-home-cta-label {
      margin: 0 0 0.35rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--cba-muted);
    }
    .markdown-section .cba-home-cta-title {
      margin: 0 0 0.65rem;
      font-family: "Noto Serif SC", serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--cba-ink);
      line-height: 1.35;
    }
    .markdown-section a.cba-home-cta-btn {
      display: inline-block;
      padding: 0.55rem 1.15rem;
      background: var(--cba-accent);
      color: #fff !important;
      border: none !important;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none !important;
      margin-bottom: 0.5rem;
    }
    .markdown-section a.cba-home-cta-btn:hover {
      background: #0a4d66;
      color: #fff !important;
    }
    .markdown-section .cba-home-cta-hint {
      margin: 0;
      font-size: 0.88em;
      color: var(--cba-muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    /**
     * 可选：访问分析（在 Plausible / GA4 后台查看访问量、国家/地区、来源等）
     * - plausibleDomain：在 https://plausible.io 添加站点后的域名，如 cba-usa.github.io
     * - ga4MeasurementId：如 G-XXXXXXXXXX
     * 留空则不加载任何统计脚本。
     */
    window.CBA_SITE_CONFIG = {
      officialSiteUrl: "https://cba-usa.org/",
      contactEmail: "contact@cba-usa.org",
      plausibleDomain: "",
      ga4MeasurementId: "",
    };

    window.$docsify = {
      basePath: "/cba-biopharma/",
      name: "CBA 生物医药全球研发信息汇总",
      repo: "",
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: false,
      themeColor: "#0d5c7c",
      search: {
        placeholder: "搜索全文…",
        depth: 3,
      },
      plugins: [
        function (hook) {
          hook.afterEach(function (html) {
            var cfg = window.CBA_SITE_CONFIG || {};
            var site = cfg.officialSiteUrl || "https://cba-usa.org/";
            var email = cfg.contactEmail || "contact@cba-usa.org";
            var esc = function (s) {
              return String(s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/"/g, "&quot;");
            };
            var footer =
              '<footer class="cba-site-footer" role="contentinfo">' +
              '<hr class="cba-footer-hr" />' +
              '<div class="cba-footer-grid">' +
              "<div>" +
              "<strong>Chinese Biopharmaceutical Association, USA (CBA)</strong>" +
              '<p class="cba-footer-mission">美国华人生物医药协会 · ' +
              '<a href="' +
              esc(site) +
              '" target="_blank" rel="noopener">官网 cba-usa.org</a> · ' +
              '<a href="mailto:' +
              esc(email) +
              '">' +
              esc(email) +
              "</a></p>" +
              "<p>协会使命：促进美中之间生物医药领域的交流与合作（详见官网 <a href=\"" +
              esc(site) +
              '" target="_blank" rel="noopener">About</a>）。</p>' +
              "</div>" +
              '<div class="cba-footer-analytics">' +
              '<p class="cba-footer-note">访问人数、国家/地区与流量来源需在分析工具后台查看：在下方 <code>index.html</code> 的 <code>CBA_SITE_CONFIG</code> 中填写 <code>plausibleDomain</code> 或 <code>ga4MeasurementId</code>（配置说明见 <code>guide.md</code>）。</p>' +
              "</div>" +
              "</div>" +
              '<p class="cba-footer-disclaimer">本站为 CBA 志愿者整理的研发信息汇总，仅供会员与社区参考，不代表协会全部立场；会员、活动与章程以官网为准。</p>' +
              "</footer>";
            return html + footer;
          });
          hook.doneEach(function () {
            var root = document.querySelector(".markdown-section");
            if (!root) return;

            root.querySelectorAll("blockquote").forEach(function (quote) {
              if (quote.textContent && quote.textContent.indexOf("投资 Memo") !== -1) {
                quote.classList.add("cba-investment-memo");
              }
            });

            root.querySelectorAll("table").forEach(function (table) {
              if (table.parentElement && table.parentElement.classList.contains("cba-table-scroll")) {
                return;
              }
              var wrapper = document.createElement("div");
              wrapper.className = "cba-table-scroll";
              table.parentNode.insertBefore(wrapper, table);
              wrapper.appendChild(table);
            });

            var match = location.hash.match(/#\/(weekly\/[^?]+\.md)/);
            var reportPath = match && match[1];
            var isReport = Boolean(reportPath);
            if (isReport) {
              var toc = root.querySelector("#目录, #report-toc, .cba-report-toc");
              if (toc && !toc.id) toc.id = "report-toc";
              var tocHref = "#/" + reportPath + "?id=" + encodeURIComponent(toc ? toc.id : "目录");

              root.querySelectorAll("h1[id], h2[id]").forEach(function (heading) {
                if (heading.classList.contains("app-name")) return;
                if (heading.querySelector(".cba-heading-tools")) return;
                var text = (heading.textContent || "").trim();
                if (!text || text === "目录") return;
                var tools = document.createElement("span");
                tools.className = "cba-heading-tools";
                tools.innerHTML =
                  '<a href="' +
                  tocHref +
                  '" aria-label="返回目录">返回目录</a>' +
                  '<a href="#/' +
                  reportPath +
                  '?id=' +
                  encodeURIComponent(heading.id) +
                  '" aria-label="复制或打开本章节链接">章节链接</a>';
                heading.appendChild(tools);
              });

              if (!root.querySelector(".cba-floating-toc")) {
                var floating = document.createElement("a");
                floating.className = "cba-floating-toc";
                floating.href = tocHref;
                floating.textContent = "目录";
                floating.setAttribute("aria-label", "返回报告目录");
                root.appendChild(floating);
              }
            }
          });
        },
      ],
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script>
    (function () {
      var c = window.CBA_SITE_CONFIG || {};
      if (c.plausibleDomain) {
        var p = document.createElement("script");
        p.defer = true;
        p.setAttribute("data-domain", c.plausibleDomain);
        p.src = "https://plausible.io/js/script.js";
        document.head.appendChild(p);
      }
      if (c.ga4MeasurementId) {
        var g = document.createElement("script");
        g.async = true;
        g.src = "https://www.googletagmanager.com/gtag/js?id=" + encodeURIComponent(c.ga4MeasurementId);
        document.head.appendChild(g);
        window.dataLayer = window.dataLayer || [];
        function gtag() {
          dataLayer.push(arguments);
        }
        window.gtag = gtag;
        gtag("js", new Date());
        gtag("config", c.ga4MeasurementId, { anonymize_ip: true });
      }
    })();
  </script>
