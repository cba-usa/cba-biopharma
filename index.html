<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>CBA 生物医药全球研发信息汇总</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #3e6fb8;
    }
    .markdown-section {
      max-width: 46rem;
      margin: 0 auto;
      padding: 1rem 1.25rem 3rem;
      font-size: var(--base-font-size);
      line-height: 1.65;
    }
    @media (max-width: 600px) {
      :root { --base-font-size: 15px; }
      .markdown-section { padding: 0.75rem 1rem 2.5rem; }
    }
    .app-name-link img { max-height: 2rem; }
    /* 手机：代码块与长行自动换行，避免整页横向拖动 */
    .markdown-section pre {
      max-width: 100%;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .markdown-section pre code {
      white-space: pre-wrap !important;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .markdown-section {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    /* 「原文参考」用 div 包一段时：与正文区分、仍自动换行 */
    .markdown-section .cba-yuanwen {
      margin: 0.75rem 0 1.25rem;
      padding: 0.85rem 1rem;
      background: rgba(0, 0, 0, 0.04);
      border-radius: 8px;
      border-left: 4px solid var(--theme-color, #3e6fb8);
      font-size: 0.95em;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    @media (prefers-color-scheme: dark) {
      .markdown-section .cba-yuanwen {
        background: rgba(255, 255, 255, 0.06);
      }
    }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    // 项目站点：cba-usa/cba-biopharma → https://cba-usa.github.io/cba-biopharma/
    window.$docsify = {
      basePath: "/cba-biopharma/",
      name: "CBA 生物医药全球研发信息汇总",
      repo: "",
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      // 项目站点 + 侧栏：勿开 relativePath，否则从子目录页点侧栏会解析错路径
      relativePath: false,
      search: {
        placeholder: "搜索全文…",
        depth: 3,
      },
      copyCode: {
        buttonText: "复制",
        errorText: "复制失败",
        successText: "已复制",
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
